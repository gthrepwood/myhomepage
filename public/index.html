<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Dark/Light Mode Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        
        .theme-toggle .btn {
            border-radius: 50%;
            width: 55px;
            height: 55px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 3px solid #007bff;
            background: white;
            color: #007bff;
            cursor: pointer;
        }
        
        /* Light mode (default) - clean styles */
        body {
            background-color: #f5f5f5;
        }
        
        /* Dark mode - Star Trek LCARS theme */
        body.dark-mode {
            background-color: #000033;
            background-image: 
                radial-gradient(ellipse at 20% 80%, #1a0033 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #000066 0%, transparent 40%);
        }
        
        body.dark-mode .theme-toggle .btn {
            border-color: #ff9900;
            background: #000033;
            color: #ffcc00;
            box-shadow: 3px 3px 0 #cc6600;
        }
        
        body.dark-mode .modal-content {
            background-color: #000033;
            border-left: 10px solid #ff9900;
            color: #ffcc00;
        }
        
        body.dark-mode .form-group label {
            color: #ffcc00;
        }
        
        body.dark-mode input[type="text"],
        body.dark-mode input[type="url"] {
            background-color: #000033;
            border-color: #ff9900;
            color: #ffcc00;
        }
        
        body.dark-mode h1,
        body.dark-mode h2 {
            color: #ff9900;
        }
    </style>
</head>
<body>
    <!-- Dark/Light Mode Toggle -->
    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">
            🌙
        </button>
    </div>

    <div class="container">
        <header>
            <h1>My Applications</h1>
            <button id="addButton" class="add-btn">+ Add Application</button>
        </header>
        
        <div id="buttonsContainer" class="buttons-container">
            <!-- Buttons will be rendered here -->
        </div>
    </div>

    <!-- Modal for adding/editing button -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Application</h2>
            <form id="buttonForm">
                <div class="form-group">
                    <label for="name">Name (optional - auto-generated from URL)</label>
                    <input type="text" id="name" name="name" placeholder="Leave empty to auto-generate from URL">
                </div>
                <div class="form-group">
                    <label for="url">URL</label>
                    <input type="url" id="url" name="url" required placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="color">Color</label>
                    <input type="color" id="color" name="color" value="#007bff">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="cancel-btn">Cancel</button>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Dark/Light Mode Toggle
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeBtn');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').textContent = '☀️';
            }
        }
        
        // Initialize theme on page load
        loadTheme();
    </script>
</body>
</html>
